# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ───────────────────────────────────────────────────────────────────
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g history-limit 50000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -sg escape-time 0
set -g focus-events on

# ── Vim-style pane navigation ─────────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Splits that open in current directory ─────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Resize panes ──────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Quick reload ──────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Share session helper ──────────────────────────────────────────────────────
bind S display-message "ssh -t $(whoami)@$(hostname -I | awk '{print $1}') tmux attach -t #S"

# ── Copy mode (vi keys) ───────────────────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ── Status bar — Catppuccin Mocha palette ─────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left: session name
set -g status-left-length 40
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa]"

# Right: user@host | IP | load | mem | time
set -g status-right-length 120
set -g status-right "\
#[fg=#a6e3a1]#[bg=#a6e3a1,fg=#1e1e2e] #(whoami)@#(hostname -s) \
#[bg=#1e1e2e,fg=#a6e3a1]  \
#[fg=#fab387]#[bg=#fab387,fg=#1e1e2e] #(hostname -I | awk '{print $1}') \
#[bg=#1e1e2e,fg=#fab387]  \
#[fg=#f38ba8]#[bg=#f38ba8,fg=#1e1e2e] load: #(cut -d' ' -f1-3 /proc/loadavg) \
#[bg=#1e1e2e,fg=#f38ba8]  \
#[fg=#cba6f7]#[bg=#cba6f7,fg=#1e1e2e] #(free -h | awk '/Mem/{print $3\"/\"$2}') \
#[bg=#1e1e2e,fg=#cba6f7]  \
#[fg=#89dceb]#[bg=#89dceb,fg=#1e1e2e] %a %b %d %H:%M \
#[bg=#1e1e2e,fg=#89dceb]"

# Window tabs
setw -g window-status-style "bg=#1e1e2e,fg=#6c7086"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "bg=#313244,fg=#cdd6f4,bold"
setw -g window-status-current-format \
  "#[fg=#313244]#[bg=#313244,fg=#89b4fa] #I:#W #[bg=#1e1e2e,fg=#313244]"
setw -g window-status-activity-style "bg=#1e1e2e,fg=#f38ba8"

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# ── OpenClaw shortcuts ────────────────────────────────────────────────────────
bind M new-window -n "monitor" "journalctl -fu openclaw-worker"
bind G new-window -n "logs" "tail -f ~/logs/*.log 2>/dev/null || echo 'no logs yet'"
bind T new-window -n "btm" "btm"
